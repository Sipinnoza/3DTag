name: Build AAR

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release AAR
        run: ./gradlew :tagcloud3d:assembleRelease

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: tagcloud3d-release
          path: tagcloud3d/build/outputs/aar/tagcloud3d-release.aar
          if-no-files-found: error

      - name: Upload SO files
        uses: actions/upload-artifact@v4
        with:
          name: tagcloud3d-so
          path: |
            tagcloud3d/build/intermediates/stripped_native_libs/release/stripReleaseDebugSymbols/out/lib/**/libtagcloud3d.so
          if-no-files-found: error
